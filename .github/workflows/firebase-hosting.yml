name: Build and Deploy to GCP

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: 'read'
  id-token: 'write'

env:
  PROJECT_ID: 'grain-biz-dashboard'
  REGION: 'us-central1'
  REPOSITORY: 'grain-repo'
  IMAGE: 'grainbiz-api'
  SERVICE: 'grainbiz-api'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/587389680762/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-action-1183176876@grain-biz-dashboard.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Docker Auth'
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # ── API: Build & Push ──
      - name: 'Build and Push API Container'
        run: |
          docker build \
            -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}" \
            -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest" \
            -f grain-trading-api/Dockerfile \
            grain-trading-api
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest"

      # ── API: Deploy to Cloud Run ──
      - name: 'Deploy API to Cloud Run'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}'
          flags: |
            --allow-unauthenticated
            --add-cloudsql-instances=grain-biz-dashboard:us-central1:grainbiz-db
          env_vars: |
            NODE_ENV=production
            CLOUD_SQL_CONNECTION_NAME=grain-biz-dashboard:us-central1:grainbiz-db
          secrets: |
            DB_HOST=DB_HOST:latest
            DB_NAME=DB_NAME:latest
            DB_USER=DB_USER:latest
            DB_PASSWORD=DB_PASSWORD:latest
            JWT_SECRET=JWT_SECRET:latest
            JWT_EXPIRES_IN=JWT_EXPIRES_IN:latest

      # ── Frontend: Build ──
      - name: 'Install & Build Frontend'
        working-directory: grain-dashboard
        run: |
          npm ci
          npm run build

      # ── Frontend: Deploy to Firebase Hosting ──
      - name: 'Deploy to Firebase Hosting'
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:grain-biz-dashboard --project grain-biz-dashboard
