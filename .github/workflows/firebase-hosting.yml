name: Deploy to Google Cloud

on:
  push:
    branches:
      - main

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  auth-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/587389680762/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-action-1183176876@grain-biz-dashboard.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Verify Login'
        run: 'gcloud auth list'